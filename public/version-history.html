<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Version History — All Companies</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Segoe UI', system-ui, sans-serif; background: #f5f6fa; color: #1a1a2e; }
  .header {
    background: linear-gradient(135deg, #16213e, #1a5276);
    color: white; padding: 30px; text-align: center;
  }
  .header h1 { font-size: 26px; margin-bottom: 6px; }
  .header p { font-size: 14px; opacity: 0.8; }
  .controls {
    max-width: 1100px; margin: 20px auto; padding: 0 20px;
    display: flex; gap: 12px; align-items: center; flex-wrap: wrap;
  }
  .controls input, .controls select {
    padding: 8px 14px; border: 1px solid #d0d0d0; border-radius: 6px;
    font-size: 14px; background: #fff;
  }
  .controls input { flex: 1; min-width: 200px; }
  .container { max-width: 1100px; margin: 0 auto 40px; padding: 0 20px; }
  table { width: 100%; border-collapse: collapse; background: #fff; border-radius: 10px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
  th { text-align: left; padding: 12px 14px; background: #16213e; color: #fff; font-size: 13px; font-weight: 600; }
  td { padding: 10px 14px; border-bottom: 1px solid #f0f2f5; font-size: 13px; }
  tr:hover td { background: #f8f9ff; }
  .badge {
    display: inline-block; padding: 2px 8px; border-radius: 10px;
    font-size: 11px; font-weight: 600;
  }
  .badge-current { background: #d4edda; color: #155724; }
  .badge-old { background: #f8d7da; color: #721c24; }
  .badge-stale { background: #fff3cd; color: #856404; }
  a.view-link {
    color: #3498db; text-decoration: none; font-weight: 500;
  }
  a.view-link:hover { text-decoration: underline; }
  .loading { text-align: center; padding: 60px; color: #999; font-size: 16px; }
  .stats { display: flex; gap: 20px; margin-bottom: 20px; flex-wrap: wrap; }
  .stat-card {
    background: #fff; padding: 16px 24px; border-radius: 8px;
    box-shadow: 0 2px 6px rgba(0,0,0,0.05); text-align: center; flex: 1; min-width: 140px;
  }
  .stat-card .num { font-size: 28px; font-weight: bold; color: #16213e; }
  .stat-card .label { font-size: 12px; color: #888; margin-top: 2px; }
  .empty { text-align: center; padding: 40px; color: #999; }
</style>
<link rel="stylesheet" href="section-controls.css">
</head>
<body>
<div style="background:#161b22;padding:8px 20px;border-bottom:1px solid #30363d"><a href="index.html" style="color:#58a6ff;text-decoration:none;font-size:13px">← Home</a> <a href="dashboard.html" style="color:#8b949e;text-decoration:none;font-size:13px;margin-left:15px">Dashboard</a> <a href="ebitda-levers.html" style="color:#8b949e;text-decoration:none;font-size:13px;margin-left:15px">EBITDA Levers</a> <a href="feature-roadmap.html" style="color:#8b949e;text-decoration:none;font-size:13px;margin-left:15px">Roadmap</a></div>

<div class="header">
  <h1>Page Version History</h1>
  <p>All versioned pages across all companies — Next Chapter M&A Advisory</p>
</div>

<div class="controls">
  <input type="text" id="search" placeholder="Filter by company name...">
  <select id="type-filter">
    <option value="">All Page Types</option>
    <option value="proposal">Proposal</option>
    <option value="hub">Hub</option>
    <option value="data_room">Data Room</option>
    <option value="meeting">Meeting</option>
    <option value="research">Research</option>
  </select>
</div>

<div class="container">
  <div class="stats" id="stats"></div>
  <div id="table-wrap">
    <div class="loading" id="loading">Loading version history...</div>
  </div>
</div>

<script>
(function () {
  'use strict';

  const SUPABASE_URL = 'https://dwrnfpjcvydhmhnvyzov.supabase.co';
  const ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImR3cm5mcGpjdnlkaG1obnZ5em92Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ3NTcyOTAsImV4cCI6MjA5MDMzMzI5MH0.z0Gu1TWdGPcdptB5W7efnYMmxBbvD353ExG99ftQivY';

  let allRows = [];

  function fmtDate(iso) {
    if (!iso) return '';
    const d = new Date(iso);
    return d.toLocaleDateString('en-US', { year: 'numeric', month: 'short', day: 'numeric' })
      + ' ' + d.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit', hour12: true });
  }

  function slugify(name) {
    return name.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '').substring(0, 30);
  }

  function pageFileName(companyName, pageType) {
    const slug = slugify(companyName);
    switch (pageType) {
      case 'hub': return slug + '-hub.html';
      case 'data_room': return slug + '-data-room.html';
      case 'meeting': return slug + '-meeting.html';
      case 'proposal': return slug + '.html';
      case 'research': return slug + '-research.html';
      default: return slug + '.html';
    }
  }

  async function fetchAll() {
    const resp = await fetch(
      `${SUPABASE_URL}/rest/v1/page_versions?select=company_name,page_type,version,created_at,is_stale&order=company_name.asc,page_type.asc,version.desc`,
      { headers: { 'apikey': ANON_KEY, 'Authorization': `Bearer ${ANON_KEY}` } }
    );
    if (!resp.ok) throw new Error('Failed to fetch');
    return resp.json();
  }

  function computeMaxVersions(rows) {
    const map = {};
    for (const r of rows) {
      const key = `${r.company_name}||${r.page_type}`;
      if (!map[key] || r.version > map[key]) map[key] = r.version;
    }
    return map;
  }

  function renderStats(rows) {
    const companies = new Set(rows.map(r => r.company_name));
    const types = new Set(rows.map(r => r.page_type));
    document.getElementById('stats').innerHTML = `
      <div class="stat-card"><div class="num">${companies.size}</div><div class="label">Companies</div></div>
      <div class="stat-card"><div class="num">${types.size}</div><div class="label">Page Types</div></div>
      <div class="stat-card"><div class="num">${rows.length}</div><div class="label">Total Versions</div></div>
    `;
  }

  function renderTable(rows) {
    const wrap = document.getElementById('table-wrap');
    if (rows.length === 0) {
      wrap.innerHTML = '<div class="empty">No versions match your filters.</div>';
      return;
    }

    const maxMap = computeMaxVersions(allRows);
    let html = `<table>
      <tr><th>Company</th><th>Page Type</th><th>Version</th><th>Status</th><th>Created</th><th>View</th></tr>`;

    for (const r of rows) {
      const key = `${r.company_name}||${r.page_type}`;
      const maxVer = maxMap[key] || 1;
      const isCurrent = r.version === maxVer;
      const isStale = r.is_stale;

      let badge;
      if (isStale) badge = '<span class="badge badge-stale">Stale</span>';
      else if (isCurrent) badge = '<span class="badge badge-current">Current</span>';
      else badge = '<span class="badge badge-old">Old (v' + r.version + '/' + maxVer + ')</span>';

      const filename = pageFileName(r.company_name, r.page_type);
      const link = `<a class="view-link" href="${filename}" target="_blank">Open Page</a>`;

      const typeLabel = r.page_type.replace(/_/g, ' ').replace(/\b\w/g, c => c.toUpperCase());

      html += `<tr>
        <td><strong>${r.company_name}</strong></td>
        <td>${typeLabel}</td>
        <td style="text-align:center">v${r.version}</td>
        <td>${badge}</td>
        <td>${fmtDate(r.created_at)}</td>
        <td>${link}</td>
      </tr>`;
    }
    html += '</table>';
    wrap.innerHTML = html;
  }

  function applyFilters() {
    const search = document.getElementById('search').value.toLowerCase();
    const typeFilter = document.getElementById('type-filter').value;
    let filtered = allRows;
    if (search) filtered = filtered.filter(r => r.company_name.toLowerCase().includes(search));
    if (typeFilter) filtered = filtered.filter(r => r.page_type === typeFilter);
    renderTable(filtered);
  }

  async function init() {
    try {
      allRows = await fetchAll();
      document.getElementById('loading').remove();
      renderStats(allRows);
      renderTable(allRows);

      document.getElementById('search').addEventListener('input', applyFilters);
      document.getElementById('type-filter').addEventListener('change', applyFilters);
    } catch (e) {
      document.getElementById('loading').textContent = 'Error loading data: ' + e.message;
    }
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }
})();
</script>

<script src="comment-widget.js"></script>
<script src="notification-bell.js"></script>
<script src="section-controls.js"></script>
</body>
</html>
