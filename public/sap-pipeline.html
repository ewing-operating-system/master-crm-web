<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SAP Pipeline — Next Chapter M&A</title>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Segoe UI', system-ui, sans-serif; background: #0d1117; color: #c9d1d9; line-height: 1.5; min-height: 100vh; }
  .top-nav { background: #161b22; padding: 8px 20px; border-bottom: 1px solid #30363d; }
  .top-nav a { color: #58a6ff; text-decoration: none; font-size: 13px; }
  .top-nav a + a { color: #8b949e; margin-left: 15px; }
  .header { background: #161b22; border-bottom: 1px solid #30363d; padding: 20px 32px; display: flex; justify-content: space-between; align-items: center; }
  .header h1 { font-size: 20px; font-weight: 700; color: #f0f6fc; }
  .header p { font-size: 13px; color: #8b949e; margin-top: 3px; }
  .filters { padding: 16px 32px; background: #0d1117; border-bottom: 1px solid #21262d; display: flex; gap: 12px; }
  select, input { background: #161b22; border: 1px solid #30363d; color: #c9d1d9; padding: 6px 12px; border-radius: 6px; font-size: 13px; }
  .main { padding: 24px 32px; overflow-x: auto; }
  .grid-wrap { min-width: 1100px; }
  .buyer-row { background: #161b22; border: 1px solid #30363d; border-radius: 8px; margin-bottom: 12px; overflow: hidden; }
  .buyer-header { display: grid; grid-template-columns: 180px repeat(7, 1fr); background: #0d1117; border-bottom: 1px solid #30363d; }
  .buyer-header div { padding: 8px 10px; font-size: 11px; font-weight: 600; color: #8b949e; text-transform: uppercase; letter-spacing: 0.4px; }
  .buyer-data { display: grid; grid-template-columns: 180px repeat(7, 1fr); }
  .cell { padding: 12px 10px; font-size: 12px; border-right: 1px solid #21262d; vertical-align: top; }
  .cell:last-child { border-right: none; }
  .cell-name { font-weight: 700; color: #f0f6fc; font-size: 13px; }
  .dot-green { color: #27ae60; }
  .dot-red { color: #e74c3c; }
  .dot-orange { color: #f39c12; }
  .score { display: inline-block; padding: 1px 6px; border-radius: 4px; font-size: 11px; font-weight: 700; }
  .score-high { background: #1a3a1a; color: #27ae60; }
  .score-mid { background: #3a2a10; color: #f39c12; }
  .score-low { background: #3a1a1a; color: #e74c3c; }
  .loading { color: #8b949e; font-size: 13px; padding: 40px; text-align: center; }
  .empty { color: #8b949e; font-size: 13px; padding: 32px; text-align: center; }
</style>
</head>
<body>
<div class="top-nav">
  <a href="index.html">← Home</a>
  <a href="dashboard.html">Dashboard</a>
  <a href="feature-roadmap.html">Roadmap</a>
</div>
<div class="header">
  <div>
    <h1>SAP Pipeline</h1>
    <p>Strategic Acquirer Profiles — 7-column analysis grid</p>
  </div>
  <select id="entityFilter" onchange="load()"><option value="">All Entities</option></select>
</div>
<div class="main">
  <div class="grid-wrap">
    <div class="buyer-header">
      <div>Buyer</div>
      <div>Company Overview</div>
      <div>Acquisition History</div>
      <div>Strategic Rationale</div>
      <div>Financial Capacity</div>
      <div>Decision Makers</div>
      <div>Recent News</div>
      <div>Approach Strategy</div>
    </div>
    <div id="rows"><div class="loading">Loading SAP data...</div></div>
  </div>
</div>
<script>
const SB = 'https://dwrnfpjcvydhmhnvyzov.supabase.co';
const KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImR3cm5mcGpjdnlkaG1obnZ5em92Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ3NTcyOTAsImV4cCI6MjA5MDMzMzI5MH0.z0Gu1TWdGPcdptB5W7efnYMmxBbvD353ExG99ftQivY';

function score(val) {
  if (!val) return '<span class="dot-red">✗</span>';
  const len = String(val).length;
  if (len > 80) return `<span class="score score-high">Strong</span>`;
  if (len > 30) return `<span class="score score-mid">Partial</span>`;
  return `<span class="score score-low">Thin</span>`;
}

async function load() {
  const entity = document.getElementById('entityFilter').value;
  let url = `${SB}/rest/v1/strategic_acquirer_profiles?select=*&order=company_name.asc&limit=50`;
  if (entity) url += `&entity_id=eq.${entity}`;
  const res = await fetch(url, { headers: { apikey: KEY, Authorization: `Bearer ${KEY}` } });
  const rows = res.ok ? await res.json() : [];
  if (!rows.length) { document.getElementById('rows').innerHTML = '<div class="empty">No SAP records found for this entity.</div>'; return; }
  document.getElementById('rows').innerHTML = rows.map(r => `
    <div class="buyer-row">
      <div class="buyer-data">
        <div class="cell cell-name">${r.company_name || r.buyer_name || '—'}<br><small style="color:#8b949e;font-weight:400">${r.entity_id || ''}</small></div>
        <div class="cell">${score(r.company_overview)}</div>
        <div class="cell">${score(r.acquisition_history)}</div>
        <div class="cell">${score(r.strategic_rationale)}</div>
        <div class="cell">${score(r.financial_capacity)}</div>
        <div class="cell">${score(r.decision_makers)}</div>
        <div class="cell">${score(r.recent_news)}</div>
        <div class="cell">${score(r.approach_strategy)}</div>
      </div>
    </div>`).join('');
}

async function init() {
  const res = await fetch(`${SB}/rest/v1/entities?select=id,name&order=name.asc`, { headers: { apikey: KEY, Authorization: `Bearer ${KEY}` } });
  if (res.ok) {
    const entities = await res.json();
    const sel = document.getElementById('entityFilter');
    entities.forEach(e => { const o = document.createElement('option'); o.value = e.id; o.textContent = e.name; sel.appendChild(o); });
  }
  load();
}
init();
</script>
</body>
</html>
