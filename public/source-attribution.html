<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Source Attribution — Next Chapter M&A</title>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Segoe UI', system-ui, sans-serif; background: #0d1117; color: #c9d1d9; line-height: 1.6; min-height: 100vh; }
  .top-nav { background: #161b22; padding: 8px 20px; border-bottom: 1px solid #30363d; }
  .top-nav a { color: #58a6ff; text-decoration: none; font-size: 13px; }
  .top-nav a + a { color: #8b949e; margin-left: 15px; }
  .header { background: #161b22; border-bottom: 1px solid #30363d; padding: 20px 32px; }
  .header h1 { font-size: 20px; font-weight: 700; color: #f0f6fc; }
  .header p { font-size: 13px; color: #8b949e; margin-top: 3px; }
  .filters { padding: 14px 32px; border-bottom: 1px solid #21262d; display: flex; gap: 12px; align-items: center; }
  select, input[type=text] { background: #161b22; border: 1px solid #30363d; color: #c9d1d9; padding: 6px 12px; border-radius: 6px; font-size: 13px; }
  input[type=text] { width: 240px; }
  .main { max-width: 1100px; margin: 0 auto; padding: 24px 32px; }
  table { width: 100%; border-collapse: collapse; background: #161b22; border: 1px solid #30363d; border-radius: 8px; overflow: hidden; margin-bottom: 28px; }
  th { background: #0d1117; color: #8b949e; font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; padding: 10px 14px; text-align: left; border-bottom: 1px solid #30363d; }
  td { padding: 11px 14px; font-size: 13px; border-bottom: 1px solid #21262d; vertical-align: top; }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: #1c2128; }
  .fn { display: inline-block; background: #1a2a3a; color: #58a6ff; border-radius: 3px; padding: 0 5px; font-size: 10px; font-weight: 700; vertical-align: super; cursor: pointer; }
  .badge { display: inline-block; padding: 2px 8px; border-radius: 12px; font-size: 11px; font-weight: 600; }
  .badge-corroborated { background: #1a3a1a; color: #27ae60; }
  .badge-single { background: #3a2a10; color: #f39c12; }
  .badge-unverified { background: #3a1a1a; color: #e74c3c; }
  .source-type { color: #8b949e; font-size: 11px; }
  .loading { color: #8b949e; font-size: 13px; padding: 40px; text-align: center; }
  .empty { color: #8b949e; font-size: 13px; padding: 32px; text-align: center; background: #161b22; border: 1px solid #30363d; border-radius: 8px; }
  .footnotes { background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 16px 20px; }
  .footnotes h3 { font-size: 13px; color: #8b949e; margin-bottom: 10px; }
  .fn-item { font-size: 12px; color: #8b949e; padding: 4px 0; border-bottom: 1px solid #21262d; }
  .fn-item:last-child { border-bottom: none; }
  .fn-num { color: #58a6ff; font-weight: 700; margin-right: 8px; }
</style>
</head>
<body>
<div class="top-nav">
  <a href="index.html">← Home</a>
  <a href="dashboard.html">Dashboard</a>
  <a href="feature-roadmap.html">Roadmap</a>
</div>
<div class="header">
  <h1>Source Attribution</h1>
  <p>Research facts with footnote citations and corroboration tracking</p>
</div>
<div class="filters">
  <select id="companyFilter" onchange="load()"><option value="">All Companies</option></select>
  <input type="text" id="search" placeholder="Search facts..." oninput="load()">
  <select id="corrFilter" onchange="load()"><option value="">All Corroboration</option><option value="corroborated">Corroborated</option><option value="single">Single Source</option><option value="unverified">Unverified</option></select>
</div>
<div class="main">
  <div id="tableWrap"><div class="loading">Loading sources...</div></div>
  <div id="footnotes" class="footnotes" style="display:none"><h3>Footnotes</h3><div id="fnList"></div></div>
</div>
<script>
const SB = 'https://dwrnfpjcvydhmhnvyzov.supabase.co';
const KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImR3cm5mcGpjdnlkaG1obnZ5em92Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ3NTcyOTAsImV4cCI6MjA5MDMzMzI5MH0.z0Gu1TWdGPcdptB5W7efnYMmxBbvD353ExG99ftQivY';

function corrBadge(count) {
  if (!count || count < 1) return '<span class="badge badge-unverified">Unverified</span>';
  if (count === 1) return '<span class="badge badge-single">Single Source</span>';
  return '<span class="badge badge-corroborated">Corroborated</span>';
}

async function load() {
  const company = document.getElementById('companyFilter').value;
  const search = document.getElementById('search').value.toLowerCase();
  const corr = document.getElementById('corrFilter').value;
  let url = `${SB}/rest/v1/source_attributions?select=*&order=created_at.desc&limit=200`;
  if (company) url += `&company_id=eq.${company}`;
  const res = await fetch(url, { headers: { apikey: KEY, Authorization: `Bearer ${KEY}` } });
  let rows = res.ok ? await res.json() : [];
  if (search) rows = rows.filter(r => (r.fact || r.claim || '').toLowerCase().includes(search));
  if (corr === 'corroborated') rows = rows.filter(r => (r.source_count || r.corroboration_count || 0) >= 2);
  if (corr === 'single') rows = rows.filter(r => (r.source_count || r.corroboration_count || 0) === 1);
  if (corr === 'unverified') rows = rows.filter(r => !(r.source_count || r.corroboration_count));
  if (!rows.length) { document.getElementById('tableWrap').innerHTML = '<div class="empty">No source records found. Attribution data populates as research runs.</div>'; document.getElementById('footnotes').style.display = 'none'; return; }
  const fnMap = {};
  rows.forEach((r, i) => { fnMap[i + 1] = r.source_url || r.source_name || r.source || 'Unknown source'; });
  document.getElementById('tableWrap').innerHTML = `<table>
    <thead><tr><th>#</th><th>Company</th><th>Fact / Claim</th><th>Source Type</th><th>Corroboration</th><th>Date</th></tr></thead>
    <tbody>${rows.map((r, i) => `<tr>
      <td><span class="fn" title="${fnMap[i+1]}">${i+1}</span></td>
      <td>${r.company_name || r.entity_id || '—'}</td>
      <td>${r.fact || r.claim || r.content || '—'}</td>
      <td class="source-type">${r.source_type || r.source_name || '—'}</td>
      <td>${corrBadge(r.source_count || r.corroboration_count)}</td>
      <td style="color:#8b949e;font-size:12px">${r.fact_date || r.created_at ? new Date(r.fact_date || r.created_at).toLocaleDateString() : '—'}</td>
    </tr>`).join('')}</tbody>
  </table>`;
  document.getElementById('fnList').innerHTML = Object.entries(fnMap).map(([n, s]) => `<div class="fn-item"><span class="fn-num">[${n}]</span>${s}</div>`).join('');
  document.getElementById('footnotes').style.display = 'block';
}

async function init() {
  const res = await fetch(`${SB}/rest/v1/entities?select=id,name&order=name.asc`, { headers: { apikey: KEY, Authorization: `Bearer ${KEY}` } });
  if (res.ok) {
    const ents = await res.json();
    const sel = document.getElementById('companyFilter');
    ents.forEach(e => { const o = document.createElement('option'); o.value = e.id; o.textContent = e.name; sel.appendChild(o); });
  }
  load();
}
init();
</script>
</body>
</html>
